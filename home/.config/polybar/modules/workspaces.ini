[module/workspaces]
type = internal/xworkspaces

enable-scroll = false

format = <label-state>

label-active    = "%icon%  "
label-occupied  = "%icon%  "
label-urgent    = "%icon%  "
label-empty     = "%icon%  "

label-active-foreground = ${color.red}
label-occupied-foreground = ${color.yellow}

label-active-padding    = 1
label-urgent-padding    = 1
label-occupied-padding  = 1
label-empty-padding     = 1

icon-default = 
icon-0 = 1;
icon-1 = 2;
icon-2 = 3;
icon-3 = 4;
icon-4 = 5;
