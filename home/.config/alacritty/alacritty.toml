[general]
import = ["~/Downloads/Themes/alacritty-theme/themes/kitty.toml"]

[window]
padding.x = 3
padding.y = 2

[env]
TERM = "alacritty"

[font]
size = 11.5
offset.x = -1
offset.y = 1

[font.normal]
family = "Rec Mono SemiCasual"
style = "Regular"

[font.bold]
family = "Rec Mono SemiCasual"
style = "Bold"

[font.italic]
family = "Rec Mono SemiCasual"
style = "Italic"

[font.bold_italic]
family = "Rec Mono SemiCasual"
style = "Bold Italic"
