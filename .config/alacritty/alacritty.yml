window:
  decorations: none
  #opacity: 0.7
  #startup_mode: Fullscreen
  title: Terminal
  dynamic_title: true

font:
  # Menlo
  #size: 10
  #normal:
    #family: Menlo
  
  # Fira Code
  size: 10
  normal:
    family: Fira Code
    style: Regular

  offset:
    x: -1
    y: 0

colors:
  # Default colors
  primary:
    background: '#000000'
    foreground: '#dddddd'

  # Normal colors
  normal:
    black: '#000000'
    red: '#cc0403'
    green: '#19cb00'
    yellow: '#cecb00'
    blue: '#0d73cc'
    magenta: '#cb1ed1'
    cyan: '#0dcdcd'
    white: '#dddddd'

  # Bright colors
  bright:
    black: '#767676'
    red: '#f2201f'
    green: '#23fd00'
    yellow: '#fffd00'
    blue: '#1a8fff'
    magenta: '#fd28ff'
    cyan: '#14ffff'
    white: '#ffffff'
theme: Kitty
